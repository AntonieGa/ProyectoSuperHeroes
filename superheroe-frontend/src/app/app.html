@if (authService.isAuthenticated()) {
  <nav class="navbar">
    <div class="nav-brand">HeroApp UAdeO</div>

    <div class="nav-welcome">
      Bienvenido, <strong>{{ authService.currentUser()?.nombre || 'Usuario' }}</strong>! <span>🧙‍♂️</span>
    </div>

    <div class="nav-links">
      <a routerLink="/catalog" routerLinkActive="active">Catálogo</a>
      <a routerLink="/favoritos" routerLinkActive="active">Mis Favoritos ⭐</a>
      <a routerLink="/add-hero" routerLinkActive="active">➕ Agregar Héroe</a>
      <button (click)="logout()" class="btn-logout">Cerrar Sesión</button>
    </div>
  </nav>
}

<main class="content">
  <router-outlet></router-outlet>
</main>
