<div class="form-container">
  <div class="form-box">
    <h2>⚡ Registrar Nuevo Superhéroe</h2>
    <p class="description">Agrega un nuevo integrante al catálogo global de héroes</p>

    <form (ngSubmit)="guardarHeroe()">
      <div class="form-group">
        <label for="nombre">Nombre del Héroe *</label>
        <input type="text" id="nombre" name="nombre" [(ngModel)]="nuevoHeroe.nombre" required placeholder="Ej. Green Lantern">
      </div>

      <div class="form-group">
        <label for="poder">Poder Principal *</label>
        <input type="text" id="poder" name="poder" [(ngModel)]="nuevoHeroe.poder" required placeholder="Ej. Anillo de poder modelador de energía">
      </div>

      <div class="form-group">
        <label for="imagen_url">Nombre del archivo de imagen</label>
        <input
          type="text"
          id="imagen_url"
          name="imagen_url"
          disabled
          [placeholder]="nuevoHeroe.nombre ? (nuevoHeroe.nombre.toLowerCase().replace(' ', '')) + '.png' : 'Ej. Superman.png'">
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-submit">Guardar Héroe 💾</button>
      </div>
    </form>
  </div>
</div>
